name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: Create GitHub Release (only when triggered manually with a tag checked out)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # Skip macOS code signing in CI
  CSC_IDENTITY_AUTO_DISCOVERY: false
  # Disable electron-builder update check
  ELECTRON_BUILDER_DISABLE_UPDATES: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            platform: mac
            args: --mac --x64 --arm64
          - os: windows-latest
            name: Windows
            platform: win
            args: --win
          - os: ubuntu-latest
            name: Linux
            platform: linux
            args: --linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package (${{ matrix.name }})
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-dock-${{ matrix.platform }}
          path: release/**
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
