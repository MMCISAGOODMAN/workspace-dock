<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>截图</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: crosshair;
        user-select: none;
      }
      #root {
        position: relative;
        background: rgba(0, 0, 0, 0.35);
      }
      .selection {
        position: absolute;
        border: 2px solid #3b82f6;
        background: rgba(59, 130, 246, 0.12);
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
        pointer-events: none;
      }
      .hint {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        pointer-events: none;
        z-index: 10;
      }
      .size-label {
        position: absolute;
        bottom: -24px;
        right: 0;
        padding: 2px 6px;
        background: #3b82f6;
        color: white;
        font: 11px monospace;
        border-radius: 4px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="hint">拖拽框选区域 · Esc 取消</div>
    </div>
    <script type="module" src="/src/renderer/screenshot/main.ts"></script>
  </body>
</html>
